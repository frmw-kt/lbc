<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBC Dashboard Background – Pattern 5 (Image)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --y: #F5C200;
    --dk: #140F00;
    --w: #FFFFFF;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--dk);
    font-family: 'Helvetica Neue', 'Noto Sans JP', sans-serif;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ---- フルスクリーン背景画像（MISSION） ---- */
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('img_mission.png');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.7) saturate(1.2);
    z-index: 0;
    animation: zoomOut 12s ease-out both;
  }

  @keyframes zoomOut {
    from { transform: scale(1.08); }
    to   { transform: scale(1.0); }
  }

  /* 左から右へのグラデーションオーバーレイ */
  .overlay-grad {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      rgba(20,15,0,0.92) 0%,
      rgba(20,15,0,0.75) 38%,
      rgba(20,15,0,0.30) 65%,
      rgba(20,15,0,0.10) 100%
    );
    z-index: 1;
  }

  /* イエローの薄いトーンオーバーレイ（右側） */
  .overlay-yellow {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 50%,
      rgba(245,194,0,0.18) 100%
    );
    z-index: 2;
  }

  /* ---- 左パネル ---- */
  .left-panel {
    position: absolute;
    top: 0;
    left: 0;
    width: 48%;
    height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 64px;
    gap: 32px;
  }

  .brand-block {
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .brand-name {
    font-size: clamp(56px, 7vw, 96px);
    font-weight: 900;
    font-style: italic;
    color: var(--y);
    line-height: 0.9;
    letter-spacing: -3px;
  }

  .brand-name span { color: rgba(255,255,255,0.7); }

  .brand-rule {
    width: 60px;
    height: 3px;
    background: var(--y);
    margin-top: 20px;
    border-radius: 2px;
  }

  /* MVVテキスト */
  .mission-block {
    animation: fadeUp 0.7s ease 0.25s both;
  }

  .block-label {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--y);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .block-title {
    font-size: clamp(18px, 2.2vw, 30px);
    font-weight: 900;
    color: var(--w);
    line-height: 1.4;
  }

  .block-title em {
    font-style: normal;
    color: var(--y);
  }

  /* ---- 右側 小カード群 ---- */
  .right-cards {
    position: absolute;
    top: 0;
    right: 0;
    width: 42%;
    height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 48px 60px 20px;
    gap: 20px;
  }

  .card {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
    max-height: 200px;
    cursor: default;
    transition: flex 0.5s cubic-bezier(.4,0,.2,1),
                max-height 0.5s cubic-bezier(.4,0,.2,1),
                box-shadow 0.4s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    animation: slideRight 0.6s ease both;
  }

  .card:hover {
    flex: 1.5;
    max-height: 260px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .card:nth-child(1) { animation-delay: 0.3s; }
  .card:nth-child(2) { animation-delay: 0.45s; }

  .card-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.6s ease, filter 0.5s ease;
    transform: scale(1.05);
    filter: brightness(0.8) saturate(1.1);
  }

  .card:hover .card-img {
    transform: scale(1.0);
    filter: brightness(0.95) saturate(1.3);
  }

  .card-vision .card-img  { background-image: url('img_vision.png'); }
  .card-value  .card-img  { background-image: url('img_value.png');  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(20,15,0,0.85) 0%,
      rgba(20,15,0,0.3)  50%,
      transparent        100%
    );
    z-index: 2;
    transition: opacity 0.4s;
  }

  .card:hover .card-overlay { opacity: 0.7; }

  .card-text {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px;
    z-index: 3;
  }

  .card-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--y);
    opacity: 0.8;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-title {
    font-size: clamp(16px, 1.6vw, 22px);
    font-weight: 900;
    color: var(--w);
    line-height: 1.3;
  }

  .card-title em {
    font-style: italic;
    color: var(--y);
  }

  /* ---- 上部ブランドバー ---- */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--y);
    z-index: 30;
  }

  /* ---- 下部SVGモチーフ ---- */
  .bottom-deco {
    position: absolute;
    bottom: 32px;
    left: 64px;
    z-index: 10;
    opacity: 0.35;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  /* ---- アニメーション ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideRight {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 900px) {
    .left-panel  { width: 100%; padding: 40px 28px 200px; }
    .right-cards {
      width: 100%;
      flex-direction: row;
      height: 180px;
      top: auto;
      bottom: 0;
      padding: 0;
      gap: 0;
    }
    .card { max-height: none; border-radius: 0; }
    .card:hover { flex: 1.4; }
    .bottom-deco { display: none; }
  }
</style>
</head>
<body>

<div class="scene">

  <!-- 上部アクセントライン -->
  <div class="top-bar"></div>

  <!-- ヒーロー背景 -->
  <div class="hero-bg"></div>
  <div class="overlay-grad"></div>
  <div class="overlay-yellow"></div>

  <!-- 左パネル -->
  <div class="left-panel">

    <div class="brand-block">
      <div class="brand-name">L<span>B</span>C</div>
      <div class="brand-rule"></div>
    </div>

    <div class="mission-block">
      <div class="block-label">Mission</div>
      <div class="block-title">
        <em>LBC</em>という街を創り、<br>
        関わる全ての人々に<br>
        青春を届ける。
      </div>
    </div>

  </div>

  <!-- 右側カード群 -->
  <div class="right-cards">

    <div class="card card-vision">
      <div class="card-img"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <div class="card-label">Vision</div>
        <div class="card-title">日本一の<em>Family</em>に！！</div>
      </div>
    </div>

    <div class="card card-value">
      <div class="card-img"></div>
      <div class="card-overlay"></div>
      <div class="card-text">
        <div class="card-label">Value</div>
        <div class="card-title"><em>Amazing</em><br>Standard</div>
      </div>
    </div>

  </div>

  <!-- 下部SVGモチーフ（Aライン） -->
  <svg class="bottom-deco" width="120" height="72" viewBox="0 0 120 72" fill="none">
    <line x1="0"  y1="4"  x2="60" y2="68" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="68" x2="120" y2="68" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="120" y1="68" x2="80" y2="28" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="44" x2="76" y2="44" stroke="#F5C200" stroke-width="1.8" stroke-linecap="round"/>
  </svg>

</div>

</body>
</html>
